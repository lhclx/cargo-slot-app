<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>货代舱位管理系统</title>
<style>
:root{--pri:#2F5496;--bg:#f5f7fa;--card:#fff;--bdr:#dde1e6;--txt:#333;--lt:#666;
  --g:#28a745;--y:#ffc107;--b:#17a2b8;--o:#fd7e14;--gy:#6c757d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);}
.hd{background:var(--pri);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.hd h1{font-size:20px;font-weight:600;}
.hd-btns{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s;}
.btn-p{background:#fff;color:var(--pri);}.btn-p:hover{background:#e8edf5;}
.btn-g{background:var(--g);color:#fff;}.btn-g:hover{opacity:.9;}
.btn-r{background:#dc3545;color:#fff;}.btn-r:hover{opacity:.9;}
.btn-s{padding:5px 10px;font-size:12px;}
.ct{max-width:1400px;margin:0 auto;padding:16px;}
/* stats */
.srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
.sc{background:var(--card);border-radius:10px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.sn{font-size:28px;font-weight:700;color:var(--pri);}
.sl{font-size:12px;color:var(--lt);margin-top:4px;}
/* filter */
.fbar{background:var(--card);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.fbar select,.fbar input{padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;}
/* table */
.tw{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--pri);color:#fff;padding:10px 6px;text-align:center;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:1;}
td{padding:8px 5px;text-align:center;border-bottom:1px solid #f1f3f5;vertical-align:middle;}
tr:hover td{background:#f8f9fa;}
/* badge */
.bg{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg-0{background:#d4edda;color:#155724;}.bg-1{background:#fff3cd;color:#856404;}
.bg-2{background:#d1ecf1;color:#0c5460;}.bg-3{background:#ffe5d0;color:#854000;}
.bg-4{background:#e2e3e5;color:#383d41;}
.act{display:flex;gap:4px;justify-content:center;}
/* modal */
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center;}
.ov.on{display:flex;}
.md{background:#fff;border-radius:14px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto;padding:24px;}
.md h2{margin-bottom:20px;font-size:18px;color:var(--pri);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg.fl{grid-column:1/-1;}
.fg label{font-size:12px;font-weight:600;color:var(--lt);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:13px;}
.fg textarea{resize:vertical;min-height:50px;}
.mft{margin-top:20px;display:flex;justify-content:flex-end;gap:8px;}
/* tabs */
.tabs{display:flex;gap:0;margin-bottom:16px;background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.tab{padding:12px 24px;cursor:pointer;font-size:13px;font-weight:500;color:var(--lt);border:none;background:none;transition:.2s;}
.tab.on{background:var(--pri);color:#fff;}.tab:hover:not(.on){background:#f0f2f5;}
/* chart */
.ca{background:var(--card);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.ca h3{font-size:15px;margin-bottom:14px;color:var(--pri);}
.cbs{display:flex;align-items:flex-end;gap:8px;height:160px;padding:0 10px;}
.cbw{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;}
.cb{width:100%;min-width:24px;border-radius:6px 6px 0 0;transition:height .3s;}
.cbl{font-size:10px;color:var(--lt);margin-top:4px;text-align:center;overflow:hidden;max-width:80px;text-overflow:ellipsis;white-space:nowrap;}
.cbv{font-size:11px;font-weight:600;}
.es{text-align:center;padding:60px 20px;color:var(--lt);}
.es .ic{font-size:48px;margin-bottom:12px;}
@media(max-width:768px){.fg{grid-template-columns:1fr;}.srow{grid-template-columns:repeat(2,1fr);}table{font-size:11px;}td,th{padding:6px 3px;}}
</style>
</head>
<body>
<div class="hd">
  <h1>🚢 货代舱位管理系统</h1>
  <div class="hd-btns">
    <button class="btn btn-p" onclick="openModal()">+ 新增舱位</button>
    <button class="btn btn-g" onclick="exportData()">📥 导出</button>
    <button class="btn btn-p" onclick="refreshData()">🔄 刷新</button>
  </div>
</div>
<div class="ct">
  <div class="srow" id="statsRow"></div>
  <div class="tabs">
    <button class="tab on" onclick="swTab('list')">📋 舱位列表</button>
    <button class="tab" onclick="swTab('chart')">📊 数据统计</button>
  </div>
  <div class="fbar" id="filterBar">
    <select id="fs" onchange="loadSlots()"><option value="">全部状态</option><option>空闲</option><option>已预订</option><option>已确认</option><option>已放货</option><option>已完结</option></select>
    <select id="fc" onchange="loadSlots()"><option value="">全部船公司</option></select>
    <select id="fo" onchange="loadSlots()"><option value="">全部操作</option></select>
    <input id="fq" placeholder="🔍 搜索SO号/约号/客户..." oninput="loadSlots()">
  </div>
  <div id="listView">
    <div class="tw"><table><thead><tr><th>ID</th><th>船公司</th><th>SO号</th><th>约号</th><th>起运港</th><th>目的港</th><th>柜型</th><th>数量</th><th>ETD</th><th>ETA</th><th>状态</th><th>分配客户</th><th>操作归属</th><th>备注</th><th>操作</th></tr></thead><tbody id="tb"></tbody></table></div>
    <div id="es" class="es" style="display:none"><div class="ic">📦</div><p>暂无数据，点击「新增舱位」添加</p></div>
  </div>
  <div id="chartView" style="display:none">
    <div class="ca"><h3>📋 按使用状态分布</h3><div id="cs" class="cbs"></div></div>
    <div class="ca"><h3>🚢 按船公司分布</h3><div id="cc" class="cbs"></div></div>
    <div class="ca"><h3>📍 按目的港分布</h3><div id="cp" class="cbs"></div></div>
    <div class="ca"><h3>👤 按操作归属分布</h3><div id="co" class="cbs"></div></div>
  </div>
</div>

<!-- Modal -->
<div class="ov" id="modal">
<div class="md">
<h2 id="mt">新增舱位</h2>
<form id="fm" onsubmit="saveSlot(event)">
<input type="hidden" id="fid">
<div class="fg">
<div class="fg"><label>船公司 *</label><select id="fcarr" required><option value="">请选择</option><option>MSC</option><option>MSK</option><option>CMA</option><option>COSCO</option><option>EVERGREEN</option><option>HAPAG-LLOYD</option><option>ONE</option><option>YANG MING</option><option>ZIM</option><option>PIL</option><option>Ocean Network</option><option>ANL</option><option>SITC</option><option>WANHAI</option><option>RCL</option><option>FMC</option><option>其他</option></select></div>
<div class="fg"><label>SO号 *</label><input type="text" id="fso" required placeholder="如 MSU2894710"></div>
<div class="fg"><label>约号</label><input type="text" id="fbk" placeholder="Booking Reference"></div>
<div class="fg"><label>起运港 *</label><input type="text" id="flp" required placeholder="NINGBO / SHANGHAI"></div>
<div class="fg"><label>目的港 *</label><input type="text" id="fdp" required placeholder="SYDNEY / AUCKLAND"></div>
<div class="fg"><label>柜型 *</label><select id="fct" required><option value="">请选择</option><option>20GP</option><option>40GP</option><option>40HQ</option><option>45HQ</option><option>20RF</option><option>40RF</option><option>NOR</option></select></div>
<div class="fg"><label>数量 *</label><input type="number" id="fqy" required min="1" value="1"></div>
<div class="fg"><label>ETD *</label><input type="date" id="fetd" required></div>
<div class="fg"><label>ETA</label><input type="date" id="feta"></div>
<div class="fg"><label>使用状态</label><select id="fst"><option value="空闲">空闲</option><option value="已预订">已预订</option><option value="已确认">已确认</option><option value="已放货">已放货</option><option value="已完结">已完结</option></select></div>
<div class="fg"><label>分配客户</label><input type="text" id="fcl" placeholder="客户/收货人名称"></div>
<div class="fg"><label>操作归属</label><input type="text" id="fop" placeholder="跟单操作员"></div>
<div class="fg fl"><label>备注</label><textarea id="frm" placeholder="补充信息..."></textarea></div>
</div>
<div class="mft"><button type="button" class="btn btn-s" style="background:var(--bdr)" onclick="closeModal()">取消</button><button type="submit" class="btn btn-s btn-g">保存</button></div>
</form>
</div>
</div>

<script>
const API='/api'; let allData=[]; let editId=null;

const ST_MAP={'空闲':0,'已预订':1,'已确认':2,'已放货':3,'已完结':4};
const ST_CLS=['bg-0','bg-1','bg-2','bg-3','bg-4'];
const CHART_COLORS=['#2F5496','#28a745','#ffc107','#17a2b8','#fd7e14','#6f42c1','#e83e8c','#20c997','#fd7e14','#6610f2'];

async function loadStats(){
  const r=await fetch(API+'/stats'); const d=await r.json();
  const c={total:'#2F5496','空闲':'#28a745','已预订':'#ffc107','已确认':'#17a2b8','已放货':'#fd7e14','已完结':'#6c757d'};
  let h=`<div class="sc"><div class="sn">${d.total}</div><div class="sl">总舱位</div></div>`;
  for(const s of['空闲','已预订','已确认','已放货','已完结']) h+=`<div class="sc"><div class="sn" style="color:${c[s]}">${d.by_status[s]||0}</div><div class="sl">${s}</div></div>`;
  document.getElementById('statsRow').innerHTML=h;

  // charts
  renderChart('cs',d.by_status);
  renderChart('cc',d.by_carrier);
  renderChart('cp',d.by_destination);
  renderChart('co',d.by_operator);

  // populate filter dropdowns
  const carriers=new Set(); const ops=new Set();
  (await fetch(API+'/slots')).json().then(arr=>{arr.forEach(s=>{carriers.add(s.carrier);ops.add(s.operator||'');});
    const fc=document.getElementById('fc'); Array.from(fc.options).forEach(o=>{if(o.value&&o.value!=='全部船公司') o.remove()});
    carriers.forEach(v=>{if(v) fc.appendChild(new Option(v,v))});
    const fo=document.getElementById('fo'); Array.from(fo.options).forEach(o=>{if(o.value&&o.value!=='全部操作') o.remove()});
    ops.forEach(v=>{if(v) fo.appendChild(new Option(v,v))});
  });
}

function renderChart(id,data){
  const el=document.getElementById(id); if(!el) return;
  const entries=Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!entries.length){el.innerHTML='<p style="color:var(--lt);text-align:center;width:100%">暂无数据</p>';return;}
  const max=Math.max(...entries.map(e=>e[1]),1);
  el.innerHTML=entries.map(([k,v],i)=>`<div class="cbw"><div class="cb" style="height:${v/max*140}px;background:${CHART_COLORS[i%CHART_COLORS.length]}"></div><div class="cbv">${v}</div><div class="cbl" title="${k}">${k}</div></div>`).join('');
}

async function loadSlots(){
  const p=new URLSearchParams();
  const fs=document.getElementById('fs').value; if(p) p.append('status',fs);
  const fc=document.getElementById('fc').value; if(fc) p.append('carrier',fc);
  const fo=document.getElementById('fo').value; if(fo) p.append('operator',fo);
  const fq=document.getElementById('fq').value; if(fq) p.append('q',fq);
  const r=await fetch(API+'/slots?'+p.toString()); allData=await r.json();
  renderTable();
}

function renderTable(){
  const tb=document.getElementById('tb'); const es=document.getElementById('es');
  if(!allData.length){tb.innerHTML='';es.style.display='block';return;}
  es.style.display='none';
  tb.innerHTML=allData.map(s=>{
    const si=ST_MAP[s.status]??0;
    return `<tr>
      <td>${s.id}</td><td>${esc(s.carrier)}</td><td style="font-weight:600">${esc(s.so_no)}</td><td>${esc(s.booking_ref)}</td>
      <td>${esc(s.loading_port)}</td><td>${esc(s.destination_port)}</td><td><strong>${esc(s.container_type)}</strong></td>
      <td>${s.quantity}</td><td>${s.etd||''}</td><td>${s.eta||''}</td>
      <td><span class="bg ${ST_CLS[si]||''}">${esc(s.status)}</span></td>
      <td>${esc(s.client)}</td><td>${esc(s.operator)}</td><td>${esc(s.remark||'')}</td>
      <td class="act"><button class="btn btn-s btn-p" onclick="editSlot(${s.id})">编辑</button><button class="btn btn-s btn-r" onclick="delSlot(${s.id})">删除</button></td>
    </tr>`;
  }).join('');
}

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function openModal(){editId=null;document.getElementById('mt').textContent='新增舱位';document.getElementById('fm').reset();document.getElementById('fid').value='';document.getElementById('modal').classList.add('on');}

function closeModal(){document.getElementById('modal').classList.remove('on');}

async function editSlot(id){
  const s=allData.find(x=>x.id===id); if(!s)return;
  editId=id; document.getElementById('mt').textContent='编辑舱位';
  document.getElementById('fid').value=s.id;
  document.getElementById('fcarr').value=s.carrier||'';
  document.getElementById('fso').value=s.so_no||'';
  document.getElementById('fbk').value=s.booking_ref||'';
  document.getElementById('flp').value=s.loading_port||'';
  document.getElementById('fdp').value=s.destination_port||'';
  document.getElementById('fct').value=s.container_type||'';
  document.getElementById('fqy').value=s.quantity||1;
  document.getElementById('fetd').value=s.etd||'';
  document.getElementById('feta').value=s.eta||'';
  document.getElementById('fst').value=s.status||'空闲';
  document.getElementById('fcl').value=s.client||'';
  document.getElementById('fop').value=s.operator||'';
  document.getElementById('frm').value=s.remark||'';
  document.getElementById('modal').classList.add('on');
}

async function saveSlot(e){
  e.preventDefault();
  const payload={
    carrier:document.getElementById('fcarr').value,
    so_no:document.getElementById('fso').value.trim(),
    booking_ref:document.getElementById('fbk').value.trim(),
    loading_port:document.getElementById('flp').value.trim().toUpperCase(),
    destination_port:document.getElementById('fdp').value.trim().toUpperCase(),
    container_type:document.getElementById('fct').value,
    quantity:parseInt(document.getElementById('fqy').value)||1,
    etd:document.getElementById('fetd').value,
    eta:document.getElementById('feta').value,
    status:document.getElementById('fst').value,
    client:document.getElementById('fcl').value.trim(),
    operator:document.getElementById('fop').value.trim(),
    remark:document.getElementById('frm').value.trim()
  };
  if(editId){
    await fetch(API+'/slots/'+editId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }else{
    await fetch(API+'/slots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }
  closeModal(); refreshData();
}

async function delSlot(id){
  if(!confirm('确定删除此条舱位记录？'))return;
  await fetch(API+'/slots/'+id,{method:'DELETE'});
  refreshData();
}

function swTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  event.target.classList.add('on');
  document.getElementById('listView').style.display=t==='list'?'block':'none';
  document.getElementById('chartView').style.display=t==='chart'?'block':'none';
  if(t==='chart') loadStats();
}

function exportData(){
  // CSV export
  const headers=['ID','船公司','SO号','约号','起运港','目的港','柜型','数量','ETD','ETA','使用状态','分配客户','操作归属','备注'];
  const rows=[headers.join(',')];
  allData.forEach(s=>{rows.push([s.id,s.carrier,s.so_no,s.booking_ref,s.loading_port,s.destination_port,s.container_type,s.quantity,s.etd,s.eta,s.status,s.client,s.operator,s.remark||''].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));});
  const BOM='\uFEFF'; const blob=new Blob([BOM+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`舱位导出_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

async function refreshData(){await Promise.all([loadStats(),loadSlots()]);}

// init
refreshData();
</script>
</body>
</html>
